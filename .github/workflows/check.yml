name: Check
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shell tooling
        run: sudo apt-get update && sudo apt-get install -y shellcheck zsh

      - name: ShellCheck
        run: shellcheck scripts/*.sh

      - name: Zsh syntax check
        run: zsh -n zsh/.zprofile zsh/.zshrc zsh/history.zsh zsh/keybindings.zsh env/aliases.sh env/functions.sh env/environment.sh

      - name: Lint Markdown
        uses: tomwhross/write-good-action@v1.6
