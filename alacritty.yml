[cursor]
blink_interval = 550
unfocused_hollow = false
thickness = 0.15

[cursor.style]
blinking = "On"
shape = "Block"

[selection]
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"
save_to_clipboard = true

[scrolling]
history = 10000
multiplier = 4

[font]
size = 13.0

[font.normal]
family = "Maple Mono"
style = "Regular"

[font.bold]
family = "Maple Mono"
style = "Bold"

[font.offset]
x = 0
y = 4

[window]
decorations = "transparent"
dynamic_padding = true

[window.padding]
x = 22
y = 22

[window.dimensions]
columns = 110
lines = 32

[colors.primary]
background = "0x282c34"
foreground = "0xbfc7d5"

[colors.normal]
black   = "0x282c34"
red     = "0xe06c75"
green   = "0x98c379"
yellow  = "0xd19a66"
blue    = "0x61afef"
magenta = "0xc678dd"
cyan    = "0x56b6c2"
white   = "0xd0d0d0"

[colors.bright]
black   = "0x808080"
red     = "0xff6c6b"
green   = "0x98c379"
yellow  = "0xe5c07b"
blue    = "0x61afef"
magenta = "0xc678dd"
cyan    = "0x56b6c2"
white   = "0xffffff"
