# Turn the mouse on
set-option -g mouse on

# Time in milliseconds for which tmux waits after an escape
set-option -g escape-time 0

# Enable supported focus events
set-option -g focus-events on

# History settings
set-option -g history-limit 10000

# Activity
set-option -g monitor-activity on
set-option -g visual-activity off

# Start window index at 1
set-option -g base-index 1

# Start pane index at 1
set-option -g pane-base-index 1

# Rename window to reflect current program
set-option -g -w automatic-rename on

# Renumber windows when one is closed
set-option -g renumber-windows on

# No bells at all
set-option -g bell-action none

# Enable RGB color if running in xterm
set-option -g -a terminal-overrides ",xterm-256color:Tc"

# Clipboard integration (macOS first, Linux fallback)
if-shell 'command -v pbcopy >/dev/null 2>&1' \
  'set-option -g @copy_command "pbcopy"' \
  'if-shell "command -v xclip >/dev/null 2>&1" "set-option -g @copy_command \"xclip -selection clipboard -in\"" "set-option -g @copy_command \"cat >/dev/null\""'

# Unbind default prefix key
unbind-key C-b

# Set default prefix key
set-option -g prefix C-a

# Bind "C-a C-a" to send "C-a"
bind-key C-a send-prefix

# Reload configuration
bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

# Switch panes
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R

# Switch windows
unbind-key n
bind-key -n M-p previous-window
bind-key -n M-n next-window

# Split pane with same directory
unbind-key '"'
unbind-key '%'
bind-key '-' split-window -v -c "#{pane_current_path}"
bind-key '\' split-window -h -c "#{pane_current_path}"
bind-key '_' split-window -fv -c "#{pane_current_path}"
bind-key '|' split-window -fh -c "#{pane_current_path}"

# Resize panes
bind-key -n M-H resize-pane -L 2
bind-key -n M-J resize-pane -D 1
bind-key -n M-K resize-pane -U 1
bind-key -n M-L resize-pane -R 2

# Toggle zoom
bind-key -n M-z resize-pane -Z

# Move panes
unbind-key '{'
unbind-key '}'

# Kill pane
bind-key x kill-pane

# Kill window
unbind-key '&'
bind-key X kill-window

# Enter copy mode
bind-key -n M-v copy-mode

# Select
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Copy
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "#{@copy_command}"

# Cancel
bind-key -T copy-mode-vi Enter send-keys -X cancel

# Make mouse drag copy
set-option -s set-clipboard on
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "#{@copy_command}"

# Jump search mode with prefix
bind-key '/' copy-mode \; send-keys "/"
bind-key '?' copy-mode \; send-keys "?"

# Status Bar Style
set-option -g status-position top
set-option -g status-justify left
set-option -g status-left-length 20
set-option -g status-right-length 80
set-option -g status-left ""
set-option -g status-right "#[fg=colour245]@#h #[fg=colour240]%H:%M "
set-option -g status-style "bg=colour255,fg=colour245"

# Window Style
setw -g window-status-separator ""
setw -g window-status-format "#[fg=colour245,bg=colour255] #I:#W "
setw -g window-status-current-format "#[fg=colour24,bg=colour153,bold] #I:#W "

# Message / Mode Style
set-option -g message-style "fg=colour255,bg=colour24,bold"
set-option -g mode-style "fg=colour24,bg=colour153,bold"

# Pane Style
set-option -g pane-border-style "fg=colour252"
set-option -g pane-active-border-style "fg=colour24"
